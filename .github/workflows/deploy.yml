name: Deploy Portal to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Copy Files to VPS via Rsync
        uses: AEnterprise/rsync-deploy@v1.0.2
        env:
          DEPLOY_KEY: ${{ secrets.VPS_SSH_KEY }}
          ARGS: "-avz --delete"
          SERVER_PORT: "22"
          FOLDER: "./"
          SERVER_IP: ${{ secrets.VPS_HOST }}
          USERNAME: ${{ secrets.VPS_USERNAME }}
          SERVER_DESTINATION: "/var/www/html/"
